<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>GoalZone | Canchas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="stylesheet" href="css/canchas.css">
</head>
<body>

<div class="topbar">
    <div class="title-business">
        <i class="fa-solid fa-futbol"></i> GoalZone Deportivo
    </div>
    <div class="btn-menu">
        <button class="hamburger" aria-label="Abrir menú">
            <i class="fa-solid fa-bars"></i>
        </button>
    </div>
</div>

<div class="overlay"></div>

<aside class="sidebar">
    <div class="sidebar-logo">
        <i class="fa-solid fa-futbol"></i> GoalZone
    </div>
    <ul>
       <li>
            <a href="index.html" class="activo" data-page="inicio">
                <i class="fa-solid fa-house"></i>
                <span>Inicio</span>
            </a>
        </li>
        <li>
            <a href="canchas.html" data-page="canchas">
                <i class="fa-solid fa-table-tennis-paddle-ball"></i>
                <span>Canchas</span>
            </a>
        </li>
        <li>
            <a href="clientes.html" data-page="clientes">
                <i class="fa-solid fa-users"></i>
                <span>Clientes</span>
            </a>
        </li>
        <li>
            <a href="reserva.html" data-page="reservas">
                <i class="fa-solid fa-calendar-check"></i>
                <span>Reservas</span>
            </a>
        </li>
    </ul>
</aside>

<main class="main-content">
    <div class="container mt-4">
        <div class="d-flex flex-wrap justify-content-between align-items-center mb-4">
            <h1>
                <i class="fa-solid fa-table-tennis-paddle-ball text-success me-2"></i>Gestión de Canchas
            </h1>
            <button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#modalRegistrarCancha">
                <i class="fa-solid fa-plus"></i> Nueva Cancha
            </button>
        </div>

        <div class="table-responsive">
            <table class="table table-bordered table-hover align-middle">
                <thead class="table-success">
                    <tr>
                        <th>ID</th>
                        <th>Nombre</th>
                        <th>Precio por hora</th>
                        <th>Estado</th>
                        <th>Opciones</th>
                    </tr>
                </thead>
                <tbody id="tablaCanchas">
                    <!-- Las filas se generarán dinámicamente con JS -->
                </tbody>
            </table>
        </div>
    </div>
</main>

<!-- MODAL PARA REGISTRAR CANCHA -->
<div class="modal fade" id="modalRegistrarCancha" tabindex="-1" aria-labelledby="modalRegistrarLabel" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header bg-success text-white">
        <h1 class="modal-title fs-5" id="modalRegistrarLabel">Registrar Nueva Cancha</h1>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <form id="formRegistrarCancha" class="needs-validation" novalidate>
          <div class="row g-3">
            <div class="col-md-12">
              <label for="registroNombre" class="form-label">Nombre de la cancha</label>
              <input type="text" class="form-control" id="registroNombre" name="nombre" required>
            </div>
            <div class="col-md-6">
              <label for="registroPrecio" class="form-label">Precio por hora (S/)</label>
              <input type="number" step="0.01" class="form-control" id="registroPrecio" name="precioHora" required>
            </div>
            <div class="col-md-6">
              <label for="registroEstado" class="form-label">Estado</label>
              <select class="form-select" id="registroEstado" name="estado" required>
                <option value="disponible">Disponible</option>
                <option value="mantenimiento">Mantenimiento</option>
              </select>
            </div>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
        <button type="button" class="btn btn-success" id="btnGuardarRegistro">Registrar Cancha</button>
      </div>
    </div>
  </div>
</div>

<!-- MODAL PARA ACTUALIZAR CANCHA -->
<div class="modal fade" id="modalActualizarCancha" tabindex="-1" aria-labelledby="modalActualizarLabel" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header bg-warning text-dark">
        <h1 class="modal-title fs-5" id="modalActualizarLabel">Actualizar Cancha</h1>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <form id="formActualizarCancha" class="needs-validation" novalidate>
          <input type="hidden" id="actualizarId">
          <div class="row g-3">
            <div class="col-md-12">
              <label for="actualizarNombre" class="form-label">Nombre de la cancha</label>
              <input type="text" class="form-control" id="actualizarNombre" name="nombre" required>
            </div>
            <div class="col-md-6">
              <label for="actualizarPrecio" class="form-label">Precio por hora (S/)</label>
              <input type="number" step="0.01" class="form-control" id="actualizarPrecio" name="precioHora" required>
            </div>
            <div class="col-md-6">
              <label for="actualizarEstado" class="form-label">Estado</label>
              <select class="form-select" id="actualizarEstado" name="estado" required>
                <option value="disponible">Disponible</option>
                <option value="mantenimiento">Mantenimiento</option>
              </select>
            </div>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
        <button type="button" class="btn btn-warning" id="btnActualizarCambios">Actualizar Cancha</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/sidebar.js"></script>
<script src="js/cancha.js"></script>
</body>
</html>
