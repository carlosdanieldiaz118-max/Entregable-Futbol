<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>GoalZone | Clientes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="stylesheet" href="css/clientes.css">
</head>
<body>

<div class="topbar">
    <div class="title-business"><i class="fa-solid fa-futbol"></i> GoalZone Deportivo</div>
    <div class="btn-menu"><button class="hamburger"><i class="fa-solid fa-bars"></i></button></div>
</div>
<div class="overlay"></div>

<aside class="sidebar">
    <div class="sidebar-logo"><i class="fa-solid fa-futbol"></i> GoalZone</div>
    <ul>
        <li><a href="index.html" data-page="inicio"><i class="fa-solid fa-house"></i><span>Inicio</span></a></li>
        <li><a href="canchas.html" data-page="canchas"><i class="fa-solid fa-table-tennis-paddle-ball"></i><span>Canchas</span></a></li>
        <li><a href="clientes.html" class="activo" data-page="clientes"><i class="fa-solid fa-users"></i><span>Clientes</span></a></li>
        <li><a href="reserva.html" data-page="reservas"><i class="fa-solid fa-calendar-check"></i><span>Reservas</span></a></li>
    </ul>
</aside>

<main class="main-content">
    <div class="container mt-4">
        <div class="d-flex flex-wrap justify-content-between align-items-center mb-4">
            <h1><i class="fa-solid fa-address-book text-success me-2"></i>Gestión de Clientes</h1>
            <button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#modalRegistrarCliente">
                <i class="fa-solid fa-plus"></i> Nuevo Cliente
            </button>
        </div>
        <div class="table-responsive">
            <table class="table table-bordered table-hover align-middle">
                <thead class="table-success">
                    <tr><th>ID</th><th>Nombre</th><th>Teléfono</th><th>Email</th><th>Opciones</th></tr>
                </thead>
                <tbody id="tablaClientes"></tbody>
            </table>
        </div>
    </div>
</main>

<!-- MODAL REGISTRAR CLIENTE -->
<div class="modal fade" id="modalRegistrarCliente" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header bg-success text-white">
                <h5 class="modal-title">Registrar Cliente</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="formRegistrarCliente">
                    <div class="mb-3">
                        <label class="form-label">Nombre</label>
                        <input type="text" class="form-control" id="regNombre" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Teléfono</label>
                        <input type="text" class="form-control" id="regTelefono">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-control" id="regEmail" required>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                <button class="btn btn-success" id="btnGuardarRegistroCliente">Registrar</button>
            </div>
        </div>
    </div>
</div>

<!-- MODAL ACTUALIZAR CLIENTE -->
<div class="modal fade" id="modalActualizarCliente" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header bg-warning text-dark">
                <h5 class="modal-title">Actualizar Cliente</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="formActualizarCliente">
                    <input type="hidden" id="actClienteId">
                    <div class="mb-3">
                        <label class="form-label">Nombre</label>
                        <input type="text" class="form-control" id="actNombre" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Teléfono</label>
                        <input type="text" class="form-control" id="actTelefono">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-control" id="actEmail" required>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                <button class="btn btn-warning" id="btnActualizarCliente">Actualizar</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/sidebar.js"></script>
<script src="js/clientes.js"></script>
</body>
</html>
